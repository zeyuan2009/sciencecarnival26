<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Tic-Tac-Toe - Science Carnival Booth</title>
    <link rel="stylesheet" href="ttt.css">
</head>
<body>

    <header>
        <h1>TECH TIC-TAC-TOE</h1>
        <div class="subtitle">Human (X) vs. Computer Bot (O)</div>
    </header>

    <div id="game-container">
        <div class="scoreboard">
            <div class="score-card">
                <span class="score-label">HUMAN (X)</span>
                <span class="score-number" id="score-human">0</span>
            </div>
            <div class="score-card">
                <span class="score-label">BOT (O)</span>
                <span class="score-number" id="score-computer">0</span>
            </div>
        </div>

        <div id="status">Your turn! Tap an empty cell.</div>

        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="btn" id="reset-btn">Reset Grid</button>
    </div>

    <script src="ttt.js"></script>
    <script src="confetti.js"></script>
</body>
</html>
